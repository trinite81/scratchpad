<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.4.3/math.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: "Courier New", monospace;
      color: #e0e0e0;
    }

    .calculator {
      width: 400px;
      background: #16213e;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      overflow: hidden;
    }

    /* ── titlebar ── */
    .titlebar {
      background: #0f3460;
      padding: 12px 16px;
      font-size: 13px;
      color: #a0b4cc;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot.red    { background: #ff5f57; }
    .dot.yellow { background: #ffbd2e; }
    .dot.green  { background: #28ca41; }

    /* ── history ── */
    .history {
      height: 160px;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .history::-webkit-scrollbar { width: 4px; }
    .history::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 2px; }

    .entry { font-size: 13px; line-height: 1.5; }
    .entry .expr   { color: #6a90b0; }
    .entry .result { color: #00d4aa; }
    .entry .error  { color: #ff6b6b; }

    .hint { color: #4a5568; font-size: 13px; text-align: center; padding: 30px 0; }

    /* ── display ── */
    .display {
      background: #0d1b33;
      margin: 0 12px;
      border-radius: 8px;
      padding: 10px 14px;
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      font-size: 22px;
      color: #e0e0e0;
      letter-spacing: 1px;
      word-break: break-all;
      text-align: right;
      cursor: text;
    }
    .display.placeholder { color: #3a5068; font-size: 15px; }

    /* ── buttons ── */
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 12px;
    }

    button {
      background: #1e3a5f;
      border: none;
      border-radius: 8px;
      color: #c8daea;
      font-family: "Courier New", monospace;
      font-size: 15px;
      padding: 14px 0;
      cursor: pointer;
      transition: background 0.1s, transform 0.08s;
      user-select: none;
    }
    button:hover  { background: #254d7a; }
    button:active { background: #1a3d60; transform: scale(0.95); }

    button.op      { color: #7ec8e3; }
    button.fn      { color: #a78bfa; font-size: 13px; }
    button.const   { color: #f9a8d4; }
    button.action  { background: #0f3460; color: #a0b4cc; }
    button.action:hover { background: #1a4a7a; }
    button.clear   { background: #4a1a1a; color: #ff8080; }
    button.clear:hover { background: #6a2020; }
    button.equals  { background: #00503c; color: #00d4aa; font-size: 20px; grid-column: span 2; }
    button.equals:hover { background: #006b50; }

    .span2 { grid-column: span 2; }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="titlebar">
      <div class="dot red"></div>
      <div class="dot yellow"></div>
      <div class="dot green"></div>
      <span style="margin-left:6px">Calculator</span>
    </div>

    <div class="history" id="history">
      <div class="hint">Results will appear here</div>
    </div>

    <div class="display placeholder" id="display">0</div>

    <div class="buttons">
      <!-- row 1: trig -->
      <button class="fn" data-insert="sin(">sin(</button>
      <button class="fn" data-insert="cos(">cos(</button>
      <button class="fn" data-insert="tan(">tan(</button>
      <button class="fn" data-insert="asin(">asin(</button>

      <!-- row 2: trig inverse + log -->
      <button class="fn" data-insert="acos(">acos(</button>
      <button class="fn" data-insert="atan(">atan(</button>
      <button class="fn" data-insert="log(">ln(</button>
      <button class="fn" data-insert="log10(">log(</button>

      <!-- row 3: constants + power + imaginary -->
      <button class="const" data-insert="pi">π</button>
      <button class="const" data-insert="e">e</button>
      <button class="op" data-insert="^">^</button>
      <button class="const" data-insert="i">i</button>

      <!-- row 4: parens -->
      <button class="op span2" data-insert="(">(</button>
      <button class="op span2" data-insert=")">)</button>

      <!-- row 4: 7 8 9 / -->
      <button data-insert="7">7</button>
      <button data-insert="8">8</button>
      <button data-insert="9">9</button>
      <button class="op" data-insert=" / ">÷</button>

      <!-- row 5: 4 5 6 * -->
      <button data-insert="4">4</button>
      <button data-insert="5">5</button>
      <button data-insert="6">6</button>
      <button class="op" data-insert=" * ">×</button>

      <!-- row 6: 1 2 3 - -->
      <button data-insert="1">1</button>
      <button data-insert="2">2</button>
      <button data-insert="3">3</button>
      <button class="op" data-insert=" - ">−</button>

      <!-- row 7: 0 . clear + -->
      <button data-insert="0">0</button>
      <button data-insert=".">.</button>
      <button class="action" id="backspace">⌫</button>
      <button class="op" data-insert=" + ">+</button>

      <!-- row 8: clear + equals -->
      <button class="clear span2" id="clear">C</button>
      <button class="equals" id="equals">=</button>
    </div>
  </div>

  <script>
    const display  = document.getElementById("display");
    const history  = document.getElementById("history");
    const hasEntry = { value: false };
    let expr = "";

    function updateDisplay() {
      if (expr === "") {
        display.textContent = "0";
        display.classList.add("placeholder");
      } else {
        display.textContent = expr;
        display.classList.remove("placeholder");
      }
    }

    function appendHistory(exprStr, result, isError) {
      if (!hasEntry.value) { history.innerHTML = ""; hasEntry.value = true; }
      const div = document.createElement("div");
      div.className = "entry";
      div.innerHTML =
        `<span class="expr">${escHtml(exprStr)} =</span> ` +
        `<span class="${isError ? "error" : "result"}">${escHtml(String(result))}</span>`;
      history.appendChild(div);
      history.scrollTop = history.scrollHeight;
    }

    function evaluate() {
      if (!expr.trim()) return;
      try {
        const result = math.evaluate(expr);
        const formatted = math.format(result, { precision: 10 });
        appendHistory(expr, formatted, false);
        expr = formatted.toString();
      } catch (err) {
        appendHistory(expr, err.message, true);
        expr = "";
      }
      updateDisplay();
    }

    function escHtml(s) {
      return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    // Button clicks
    document.querySelectorAll("button[data-insert]").forEach(btn => {
      btn.addEventListener("click", () => {
        expr += btn.dataset.insert;
        updateDisplay();
      });
    });

    document.getElementById("backspace").addEventListener("click", () => {
      expr = expr.trimEnd();
      // remove last token (handles multi-char like "sin(", " + ", etc.)
      expr = expr.replace(/(\s*[\+\-\*\/]\s*|log10\(|asin\(|acos\(|atan\(|sin\(|cos\(|tan\(|log\(|pi|.)$/, "");
      updateDisplay();
    });

    document.getElementById("clear").addEventListener("click", () => {
      expr = "";
      updateDisplay();
    });

    document.getElementById("equals").addEventListener("click", evaluate);

    // Keyboard support
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter")     { evaluate(); return; }
      if (e.key === "Backspace") { document.getElementById("backspace").click(); return; }
      if (e.key === "Escape")    { document.getElementById("clear").click(); return; }
      const allowed = /^[\d\+\-\*\/\^\.\(\)a-zA-Z\s]$/;
      if (allowed.test(e.key))  { expr += e.key; updateDisplay(); }
    });
  </script>
</body>
</html>
